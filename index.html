<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReviewPilot Router</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background: #0B1120;
            color: #E7ECF5;
            font-family: 'Inter', system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            max-width: 400px;
            width: 90%;
            padding: 24px;
            background: #111B30;
            border-radius: 16px;
            border: 1px solid #1e293b;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #1A2440;
            border-top: 4px solid #4FE3C1;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h2 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        p {
            color: #94A3B8;
            font-size: 14px;
            margin-bottom: 20px;
            line-height: 1.5;
        }
        input {
            width: 100%;
            padding: 12px;
            background: #1E293B;
            border: 1px solid #334155;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            box-sizing: border-box;
            margin-bottom: 16px;
            outline: none;
        }
        input:focus {
            border-color: #4FE3C1;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #4FE3C1;
            color: #0B1120;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover {
            background: #3bd0ae;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>

    <!-- LOADING SCREEN (Shown during redirect checks) -->
    <div id="loading-screen" class="container">
        <div class="spinner"></div>
        <h2 id="status">Routing connection...</h2>
    </div>

    <!-- SETUP SCREEN (Shown only if the ID has no link assigned yet) -->
    <div id="setup-screen" class="container hidden">
        <h2>Configure Your Link</h2>
        <p>This identifier (<strong id="display-qr-id"></strong>) is not active yet. Enter your desired destination URL to set it up.</p>
        <input type="url" id="target-url-input" placeholder="https://example.com" required>
        <button id="save-btn">Activate Link</button>
    </div>

    <script>
        (async function() {
            "use strict";
            
            // Database Connection Configurations
            const SUPABASE_URL = 'https://ormpdfzuczlrabdevohr.supabase.co';
            const SUPABASE_ANON_KEY = 'sb_publishable_9DhjEALPNbsbjCt184chTQ_Z_oqNjsM';
            const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

            // Parse URL Parameters (Checks for '?id=...')
            const urlParams = new URLSearchParams(window.location.search);
            const qrId = urlParams.get('id');

            const loadingScreen = document.getElementById('loading-screen');
            const setupScreen = document.getElementById('setup-screen');
            const statusEl = document.getElementById('status');
            const displayQrId = document.getElementById('display-qr-id');
            const targetUrlInput = document.getElementById('target-url-input');
            const saveBtn = document.getElementById('save-btn');

            // Fallback if someone lands on this page without an ID query
            if (!qrId) {
                statusEl.innerText = "Welcome to ReviewPilot. No ID was provided to route.";
                document.querySelector('.spinner').style.display = 'none';
                return;
            }

            try {
                // 1. Look up the ID in Supabase
                let { data: qrItem, error } = await supabaseClient
                    .from('qr_codes')
                    .select('*')
                    .eq('qr_id', qrId)
                    .maybeSingle();

                // Case A: The record doesn't exist in the database, OR target_url is empty
                if (error || !qrItem || !qrItem.target_url) {
                    showSetupScreen(qrId, qrItem);
                    return;
                }

                // Case B: The redirect link is paused
                if (qrItem.status === 'paused') {
                    statusEl.innerText = "This redirection link has been temporarily paused.";
                    return;
                }

                // Case C: Success! Update count & redirect
                await supabaseClient
                    .from('qr_codes')
                    .update({ scan_count: (qrItem.scan_count || 0) + 1 })
                    .eq('qr_id', qrId);

                window.location.replace(qrItem.target_url);

            } catch (err) {
                statusEl.innerText = "Network transmission error. Please retry.";
            }

            // Function to display configuration screen
            function showSetupScreen(id, existingRecord) {
                loadingScreen.classList.add('hidden');
                setupScreen.classList.remove('hidden');
                displayQrId.innerText = id;

                saveBtn.addEventListener('click', async () => {
                    let inputUrl = targetUrlInput.value.trim();
                    if (!inputUrl) {
                        alert("Please enter a valid URL.");
                        return;
                    }

                    // Prepend protocol if missing
                    if (!/^https?:\/\//i.test(inputUrl)) {
                        inputUrl = 'https://' + inputUrl;
                    }

                    saveBtn.innerText = "Saving...";
                    saveBtn.disabled = true;

                    try {
                        let saveError;

                        if (existingRecord) {
                            // Update blank row
                            const { error } = await supabaseClient
                                .from('qr_codes')
                                .update({ target_url: inputUrl, status: 'assigned' })
                                .eq('qr_id', id);
                            saveError = error;
                        } else {
                            // Insert new row
                            const { error } = await supabaseClient
                                .from('qr_codes')
                                .insert([{ 
                                    qr_id: id, 
                                    title: 'Self-Activated Code', 
                                    target_url: inputUrl, 
                                    status: 'assigned',
                                    scan_count: 0
                                }]);
                            saveError = error;
                        }

                        if (saveError) throw saveError;

                        alert("Setup complete! Redirecting you now...");
                        window.location.replace(inputUrl);

                    } catch (err) {
                        alert("Failed to save. Make sure RLS is disabled on Supabase!");
                        saveBtn.innerText = "Activate Link";
                        saveBtn.disabled = false;
                    }
                });
            }
        })();
    </script>
</body>
</html>
